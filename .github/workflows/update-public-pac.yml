name: Update public PAC files

"on":
  schedule:
    # Once daily. GitHub's scheduler is intentionally treated as a cadence, not an exact-time SLA.
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: public-pac-update
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"
      - name: Install JavaScript minifier
        run: pnpm install --frozen-lockfile
      - name: Run generator tests
        run: python -m unittest discover -s tests -v
      - name: Run PAC minifier tests
        run: pnpm run test:minify

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"
      - name: Install JavaScript minifier
        run: pnpm install --frozen-lockfile
      - name: Generate public PAC artifacts
        run: python scripts/generate_pac.py --template templates/white.pac --out-dir generated
      - name: Create compressed PAC aliases
        run: pnpm run minify:pac -- --out-dir generated
      - name: Validate generated PAC behavior
        run: |
          node scripts/validate_pac.mjs \
            generated/ip/8989.pac \
            generated/ip/7070.pac \
            generated/ip/m.8989.pac \
            generated/ip/m.7070.pac
      - name: Publish release branches only when content changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git fetch origin \
            dev:refs/remotes/origin/dev \
            devip:refs/remotes/origin/devip

          publish_branch() {
            branch="$1"
            worktree="$RUNNER_TEMP/pac-$branch"
            shift
            targets=()

            git worktree add --detach "$worktree" "origin/$branch"
            while [ "$#" -gt 0 ]; do
              source_file="$1"
              target_file="$2"
              shift 2
              install -m 0644 "$GITHUB_WORKSPACE/$source_file" "$worktree/$target_file"
              targets+=("$target_file")
            done

            (
              cd "$worktree"
              git add -- "${targets[@]}"
              if git diff --cached --quiet; then
                echo "$branch is already current"
              else
                git commit -m "chore: update public PAC files"
                git push origin "HEAD:$branch"
              fi
            )
            git worktree remove --force "$worktree"
          }

          publish_branch dev \
            generated/generic/8989.pac 8989.pac \
            generated/generic/7070.pac 7070.pac

          publish_branch devip \
            generated/cn.lst cn.lst \
            generated/ip/8989.pac 8989.pac \
            generated/ip/7070.pac 7070.pac \
            generated/ip/m.8989.pac m.8989.pac \
            generated/ip/m.7070.pac m.7070.pac
